# Remote ID Web Interface - Docker Compose Configuration
# Production deployment configuration
#
# Usage:
#   docker-compose up -d
#
# To update:
#   docker-compose pull && docker-compose up -d

services:
  web:
    build: .
    image: remoteid-web:latest
    container_name: remoteid-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      # Configuration directory (required)
      - ./config:/app/config:ro
      # Database persistence (bind mount to host directory)
      - ./data:/app/data
      # only leave this for dev, not prod
      - ./templates:/app/templates
      # only leave this for dev, not prod
      - ./static:/app/static
    env_file:
      - .env
    environment:
      # Python settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/config')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - remoteid-network

networks:
  remoteid-network:
    driver: bridge
