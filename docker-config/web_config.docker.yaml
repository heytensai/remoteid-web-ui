# Web Interface Configuration for Docker Development
# This config is optimized for local development with Docker

web_interface:
  # Web server settings
  host: "0.0.0.0"
  port: 5000

  # Path to web interface database (local SQLite inside container)
  database_path: "/app/data/web.db"

  # Map configuration
  # Default to a demo location (San Francisco area)
  map:
    center_lat: 37.7749
    center_lon: -122.4194
    default_zoom: 11
    tile_provider: "osm"

  default_hours: 24
  # Display units: true for metric (meters), false for imperial (feet)
  use_metric: true
  # Limit to prevent browser lag
  max_positions_per_query: 5000

  # API keys for remote node data submission
  # See default.web_config.yaml for documentation
  api_keys: {}

  # Manufacturer prefixes: serial prefix -> manufacturer name
  # ICAO-assigned 4-char manufacturer codes per ANSI/CTA-2063-A
  manufacturer_prefixes:
    "1581F": "DJI"         # DJI 20-digit RID serials (length code F)
    "1588E": "Parrot"      # Parrot Anafi Ai (length code E)
    "17444": "Wingtra"     # WingtraOne Gen II (length code 4)
    "1596": "Dronetag"     # Remote ID module manufacturer
    "2146": "Contixo"      # Contixo Inc.

  # Custom waypoints & geozones displayed on the map
  waypoints:
    - name: "Demo Waypoint"
      lat: 37.7749
      lon: -122.4194
      type: "point"
      icon: "fa-map-pin"
      color: "#e74c3c"
      description: "Example waypoint for development"
      enabled: true
      category: "demo"
    - name: "Demo Circle Zone"
      lat: 37.7800
      lon: -122.4200
      type: "circle"
      radius: 150
      color: "#e67e22"
      fill_opacity: 0.12
      description: "Circle geozone example"
      enabled: true
      category: "demo"
      alert_enabled: true
    - name: "Demo Rect Zone"
      lat: 37.7700
      lon: -122.4150
      type: "rectangle"
      width: 100
      height: 60
      color: "#27ae60"
      fill_opacity: 0.1
      description: "Rectangle geozone example"
      enabled: true
      category: "demo"
      alert_enabled: true

  # Role-based access control
  roles:
    operator:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - view_sources
        - view_stats
        - view_alert_history
        - view_settings
        - use_replay
        - export_data
        - add_waypoint
        - edit_waypoint
        - delete_waypoint
        - add_alias
        - edit_alias
        - delete_alias
        - push_notifications
        - manage_collectors
    viewer:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - view_alert_history
        - use_replay
        - push_notifications
    guest:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - use_replay

  # Background session detection
  session_detection:
    enabled: false
    interval: 600
    gap_threshold: 600
    log_level: INFO

  alerts:
    stale_timeout: 300
    skip_known_drones: false

  # Background maintenance tasks
  maintenance:
    enabled: false
    interval: 3600
    delete_expired_tokens: true
    delete_expired_login_tokens: true
    delete_orphaned_ephemeral_users: true

  # Collector positions
  collectors:
    - name: "Dev Car"
      type: "mobile"
      api_key: "dev-car-key"
      color: "#e67e22"
      # Uncomment if timestamps from this collector are in a local timezone:
      # timezone: "America/Denver"

  position_stale_minutes: 30
