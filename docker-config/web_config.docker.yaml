# Web Interface Configuration for Docker Development
# This config is optimized for local development with Docker

web_interface:
  # Web server settings
  host: "0.0.0.0"
  port: 5000

  # Path to web interface database (local SQLite inside container)
  database_path: "/app/data/web.db"

  # Sync settings
  sync_interval: 30  # seconds between syncs from collectors

  # Collector sources
  # For Docker dev, we use a mock collector with sample data
  collectors:
    - name: "Mock-Collector"
      # In Docker dev, we mount mock data at this path
      remote_db_path: "/app/data/mock_collector.db"

  # Map configuration
  # Default to a demo location (San Francisco area)
  map:
    center_lat: 37.7749
    center_lon: -122.4194
    default_zoom: 11
    tile_provider: "osm"

  default_hours: 24
  # Display units: true for metric (meters), false for imperial (feet)
  use_metric: true
  # Limit to prevent browser lag
  max_positions_per_query: 5000

  # Custom waypoints & geozones displayed on the map
  waypoints:
    - name: "Demo Waypoint"
      lat: 37.7749
      lon: -122.4194
      type: "point"
      icon: "fa-map-pin"
      color: "#e74c3c"
      description: "Example waypoint for development"
      enabled: true
      category: "demo"
    - name: "Demo Circle Zone"
      lat: 37.7800
      lon: -122.4200
      type: "circle"
      radius: 150
      color: "#e67e22"
      fill_opacity: 0.12
      description: "Circle geozone example"
      enabled: true
      category: "demo"
      alert_enabled: true
    - name: "Demo Rect Zone"
      lat: 37.7700
      lon: -122.4150
      type: "rectangle"
      width: 100
      height: 60
      color: "#27ae60"
      fill_opacity: 0.1
      description: "Rectangle geozone example"
      enabled: true
      category: "demo"
      alert_enabled: true

  # Background session detection
  session_detection:
    enabled: false
    interval: 600
    gap_threshold: 600
    log_level: INFO

  alerts:
    stale_timeout: 300
