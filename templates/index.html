<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Tracker</title>

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com data:; connect-src 'self';">

    <link rel="icon" type="image/svg+xml" href="{{ url_prefix }}{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_prefix }}{{ url_for('static', filename='favicon.svg') }}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_prefix }}{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-base-url="{{ url_prefix }}">
    <!-- App Container wraps sidebar and main content -->
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2><img src="{{ url_prefix }}{{ url_for('static', filename='favicon.svg') }}" alt="" style="width: 28px; height: 28px; vertical-align: middle; margin-right: 8px;"> Drone Tracker</h2>
                <button id="closeSidebar" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="droneList" class="drone-list">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Main Content -->
        <div id="main" class="main">
            <!-- Header -->
            <div class="header">
                <button id="openSidebar" class="menu-btn">
                    <i class="fas fa-bars"></i>
                </button>

                <button id="refreshBtn" class="refresh-btn" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="sync-toggle">
                    <div class="sync-wrapper">
                        <label class="switch">
                            <input type="checkbox" id="syncToggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="sync-label">Sync</span>
                    </div>
                </div>
                <div class="header-time-controls">
                    <div class="header-time-inputs">
                        <input type="text" id="startTime" class="flatpickr" placeholder="Start time">
                        <input type="text" id="endTime" class="flatpickr" placeholder="End time">
                    </div>
                    <div class="header-time-presets">
                        <button data-hours="1">1h</button>
                        <button data-hours="6">6h</button>
                        <button data-hours="24" class="active">24h</button>
                        <button data-hours="168">7d</button>
                    </div>
                </div>
                <button id="openSettings" class="settings-btn" title="Settings">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <!-- Map Container -->
            <div id="map" class="map-container"></div>

            <!-- Settings Panel -->
            <div id="settingsPanel" class="settings-panel">
                <div class="settings-panel-header">
                    <h3><i class="fas fa-cog"></i> Settings</h3>
                    <button id="closeSettings" class="close-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="settings-panel-body">
                    <div class="settings-section">
                        <h4 class="settings-section-title">Map Display</h4>
                        <label class="settings-item">
                            <input type="checkbox" id="showOperators" checked>
                            Show Operators
                        </label>
                        <label class="settings-item">
                            <input type="checkbox" id="showTracks" checked>
                            Show Tracks
                        </label>
                        <div class="opacity-control settings-item">
                            <span>Track Opacity</span>
                            <span id="opacityValue">60%</span>
                            <input type="range" id="trackOpacity" min="0" max="100" value="60">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h4 class="settings-section-title">Drone Visibility</h4>
                        <label class="settings-item">
                            <input type="checkbox" id="showKnownDrones" checked>
                            Show Known Drones
                        </label>
                        <label class="settings-item">
                            <input type="checkbox" id="showUnknownDrones" checked>
                            Show Unknown Drones
                        </label>
                    </div>
                </div>
            </div>

            <!-- Drone Detail Panel -->
            <div id="droneDetail" class="drone-detail">
                <div class="drone-detail-header">
                    <h3 class="drone-detail-title"><i class="fas fa-plane"></i> <span id="detailUasId"></span></h3>
                    <button id="closeDetail" class="close-btn" title="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="drone-detail-body">
                    <div class="detail-stats">
                        <div class="stat-row">
                            <span class="stat-label">Positions</span>
                            <span class="stat-value" id="detailPositions">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Max Altitude</span>
                            <span class="stat-value" id="detailMaxAlt">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Total Distance</span>
                            <span class="stat-value" id="detailDistance">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Max Speed</span>
                            <span class="stat-value" id="detailMaxSpeed">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Time Span</span>
                            <span class="stat-value" id="detailTimeSpan">-</span>
                        </div>
                    </div>
                    <div class="detail-chart-container">
                        <canvas id="detailChart"></canvas>
                    </div>
                    <div class="detail-operator" id="detailOperator" style="display: none;">
                        <h4>Operator</h4>
                        <div class="stat-row">
                            <span class="stat-label">ID</span>
                            <span class="stat-value" id="detailOperatorId">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Position</span>
                            <span class="stat-value" id="detailOperatorPos">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Time Controls -->
            <div class="time-controls">
                <div class="last-update">
                    <span id="lastUpdate">Last updated: never</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- Application JS -->
    <script src="{{ url_prefix }}{{ url_for('static', filename='js/units.js') }}"></script>
    <script src="{{ url_prefix }}{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_prefix }}{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_prefix }}{{ url_for('static', filename='js/ui.js') }}"></script>
</body>
</html>
