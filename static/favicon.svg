<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007bff"/>
      <stop offset="100%" stop-color="#00a8ff"/>
    </linearGradient>
  </defs>

  <!-- Radar sweep (bold wedge) -->
  <path d="M 50 50 L 72 10 A 42 42 0 0 1 92 28 Z" fill="url(#accent)" opacity="0.35"/>

  <!-- Radar ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.5"/>

  <!-- Drone arms -->
  <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round">
    <line x1="50" y1="34" x2="50" y2="10"/>
    <line x1="50" y1="66" x2="50" y2="90"/>
    <line x1="34" y1="50" x2="10" y2="50"/>
    <line x1="66" y1="50" x2="90" y2="50"/>
  </g>

  <!-- Propeller tips -->
  <g fill="url(#accent)" opacity="0.9">
    <rect x="42" y="2" width="16" height="6" rx="3"/>
    <rect x="42" y="92" width="16" height="6" rx="3"/>
    <rect x="2" y="42" width="6" height="16" rx="3"/>
    <rect x="92" y="42" width="6" height="16" rx="3"/>
  </g>

  <!-- Drone body -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="url(#accent)" stroke-width="4.5"/>
  <circle cx="50" cy="50" r="5" fill="url(#accent)"/>
</svg>
