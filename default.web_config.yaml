# Web Interface Configuration - Default Template
# Copy this file to 'web_config.yaml' and customize for your setup

web_interface:
  # Web server settings
  host: "0.0.0.0"
  port: 5000

  # Path to web interface database (SQLite)
  # For Docker: use "/app/data/web.db" to persist in the data volume
  # For local dev: use "./data/web.db" or "./web.db"
  database_path: "./data/web.db"

  # Map configuration
  # If center_lat/center_lon are not specified, map will auto-fit to show all drones
  map:
    center_lat: 37.7749
    center_lon: -122.4194
    default_zoom: 11
    # Options: "osm", "carto-light", "carto-dark"
    tile_provider: "osm"

  # Default time window for queries (in hours)
  default_hours: 24

  # Maximum positions per query to prevent browser lag
  max_positions_per_query: 5000

  # Display units: true for metric (meters), false for imperial (feet)
  use_metric: true

  # API keys for remote node data submission
  # Format: api_key: source_name
  # Clients must include "Authorization: Bearer <api_key>" header when submitting data
  api_keys:
    # Example keys - replace with secure random strings in production
    # "your-secure-api-key-here": "Node-A"

  # Drone aliases - map UAS IDs to friendly names
  # Format: uas_id: "Friendly Name"
  drone_aliases:
    # Example:
    # "12345": "Skydio X10"
    # "67890": "DJI Mavic 3"

  # Manufacturer prefixes - map serial number prefixes to manufacturer names
  # The longest matching prefix is used to identify the drone manufacturer.
  # Format: serial_prefix: "Manufacturer Name"
  # (hot-reloadable)
  manufacturer_prefixes:
    # Examples — ICAO-assigned 4-character manufacturer codes
    # (per ANSI/CTA-2063-A: SN = [4-char MFR Code][1-char Length Code][MFR Serial])
    # Known codes (use the first 4–5 characters including length code for precision):
    "1581F": "DJI"         # Length code F = 15-char serial (DJI 20-digit RID serials)
    # "1588E": "Parrot"    # Length code E = 14-char serial (Parrot Anafi Ai)
    # "17444": "Wingtra"   # Length code 4 = 4-char serial (WingtraOne Gen II)
    # "1596": "Dronetag"   # MFR code only (length code varies by product)
    # "2146": "Contixo"    # MFR code only

  # Custom waypoints and geozones displayed on the map
  # type: "point" (default) — marker with icon at lat/lon
  #       "circle"           — circle with dashed border drawn on map
  #       "rectangle"        — rectangle with dashed border drawn on map
  # For circle/rectangle an icon marker is also placed at center
  waypoints:
    # Point marker example:
    # - name: "Launch Site A"
    #   lat: 37.7749
    #   lon: -122.4194
    #   type: "point"            # Default if omitted
    #   icon: "fa-rocket"        # Font Awesome icon class (default: fa-map-pin)
    #   color: "#e74c3c"         # Marker/geozone color (default: #007bff)
    #   description: "Primary launch and recovery zone"
    #   enabled: true            # Show on map (default: true)
    #   category: "operations"   # Grouping label (optional)
    #
    # Circle geozone example:
    # - name: "Drone Zone"
    #   lat: 37.7749
    #   lon: -122.4194
    #   type: "circle"
    #   radius: 200              # In meters (or feet if use_metric: false)
    #   color: "#e67e22"
    #   fill_opacity: 0.15       # Translucent fill (default: 0.1)
    #   description: "Authorized flight area"
    #   icon: "fa-circle"        # Center marker icon
    #   alert_enabled: true      # Enable geozone alerting (default: false)
    #
    # Rectangle geozone example:
    # - name: "Landing Pad"
    #   lat: 37.7749
    #   lon: -122.4194
    #   type: "rectangle"
    #   width: 80                # In meters (or feet if use_metric: false)
    #   height: 40               # In meters (or feet if use_metric: false)
    #   color: "#27ae60"
    #   fill_opacity: 0.12
    #   description: "Helipad and landing area"
    #   alert_enabled: true      # Enable geozone alerting (default: false)

  # Role-based access control
  # Each role defines a set of permissions that determine what features
  # are available to users with that role. Use ["*"] for full access.
  roles:
    operator:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - view_sources
        - view_stats
        - view_alert_history
        - view_settings
        - use_replay
        - export_data
        - add_waypoint
        - edit_waypoint
        - delete_waypoint
        - add_alias
        - edit_alias
        - delete_alias
        - receive_notifications
    viewer:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - view_alert_history
        - use_replay
        - receive_notifications
    guest:
      permissions:
        - view_map
        - view_drones
        - view_tracks
        - view_operators
        - view_waypoints
        - use_replay

  # Background session detection
  # Periodically recomputes session boundaries based on time gaps between
  # position records for each drone.  Disabled by default; enable if your
  # data import pipeline does not already assign session IDs.
  # Config is hot-reloadable — changes take effect within one interval.
  session_detection:
    enabled: false
    # Seconds between detection runs (hot-reloadable)
    interval: 600
    # Gap threshold in seconds — a time gap larger than this triggers a
    # new session for that drone (hot-reloadable)
    gap_threshold: 600
    # Log verbosity: DEBUG, INFO (default), WARNING, ERROR (hot-reloadable)
    log_level: INFO

  # Geozone alerting configuration (hot-reloadable)
  # Alerts are generated when a drone enters an alert-enabled geozone
  # (circle or rectangle waypoint with alert_enabled: true).
  alerts:
    # Seconds without a position update before a geozone alert is marked
    # as "timed out" and the drone marker reverts to a stop icon
    # (hot-reloadable)
    stale_timeout: 300
    # Skip geozone alerts for drones that have an alias configured in
    # drone_aliases (hot-reloadable)
    skip_known_drones: false
    # Seconds before the same alert can fire again, keyed by event type.
    # Each entry is independent — a drone can trigger new_session,
    # geozone_enter, and geozone_exit simultaneously without interference.
    # (hot-reloadable)
    cooldown:
      new_session: 300
      geozone_enter: 300
      geozone_exit: 300
      unrecognized_drone: 300

  # Collector positions and status
  # Each collector can be either:
  #   type: "mobile" — reports position via /api/submit/ping?lat=&lon= (requires api_key)
  #   type: "fixed"  — static position from config (lat/lon required, api_key optional)
  # The remote device authenticates with "Authorization: Bearer <api_key>"
  # and calls GET /api/submit/ping?lat=...&lon=...
  # See COLLECTOR_API.md for the remote implementation docs.
  collectors:
    # - name: "Car 1"           # Display name
    #   type: "mobile"           # "mobile" or "fixed"
    #   api_key: "collector-car-1-api-key"  # Required for ping auth
    #   color: "#e67e22"         # CSS color for map marker
    #   timezone: "America/Denver"  # IANA timezone; naive timestamps converted to UTC
    # - name: "Base Station"
    #   type: "fixed"
    #   api_key: "collector-base-key"   # optional, needed for ping auth
    #   lat: 37.7749
    #   lon: -122.4194
    #   color: "#3498db"
    #   timezone: "America/New_York"

  # Background maintenance tasks
  # Periodically cleans up stale auth data (expired tokens, orphaned users).
  # Disabled by default; enable if you accumulate auth records over time.
  # Config is hot-reloadable — changes take effect within one interval.
  maintenance:
    enabled: false
    # Seconds between maintenance runs (default: 3600 = 1 hour, hot-reloadable)
    interval: 3600
    # Delete session tokens whose expiry has passed (hot-reloadable)
    delete_expired_tokens: true
    # Delete pre-created user records with expired one-time login tokens (hot-reloadable)
    delete_expired_login_tokens: true
    # Delete ephemeral (guest) users whose session tokens have all expired (hot-reloadable)
    delete_orphaned_ephemeral_users: true

  # Minutes after which a collector's marker turns gray on the map
  # when it hasn't pinged via /api/submit/ping. (hot-reloadable)
  position_stale_minutes: 30

  # Public URL of this instance (used in notification embeds like Discord)
  # Must be a full URL with scheme, e.g. "https://tracker.example.com"
  server_url: ""

  # Notification targets — dispatch alert events via configured backends.
  # Each target has a name, type, event filter, and type-specific config.
  #
  # Supported types:
  #   - "discord"  — Discord webhook (embeds) — set webhook_url
  #   - "ntfy"     — ntfy push notification service (ntfy.sh or self-hosted)
  #                  set webhook_url to the full publish URL, e.g.
  #                  "https://ntfy.sh/mytopic" or "https://ntfy.example.com/alerts"
  #   - "teams"    — Microsoft Teams Incoming Webhook (Adaptive Cards)
  #                  set webhook_url to the Incoming Webhook URL
  #
  # Optional fields:
  #   - enabled    — true/false, defaults to true. Set to false to temporarily
  #                  disable a target without removing its configuration.
  #
  # ntfy auth (mutually exclusive, omit both for public topics):
  #   - token      — Bearer token auth (e.g. "tk_xxx")
  #   - username/password — Basic auth for self-hosted servers
  #
  # Event filters (subset of ["geozone_enter", "geozone_exit", "new_session", "unrecognized_drone"]):
  #   - geozone_enter     — drone enters an alert-enabled geozone
  #   - geozone_exit      — drone leaves an alert-enabled geozone
  #   - new_session       — drone starts a new flight
  #   - unrecognized_drone — drone not in the aliases list starts a new flight
  #
  # Templates live in templates/notifications/<type>/<event>.j2
  # and can be customized per deployment.
  #
  # If no notification targets are configured, notifications are disabled.
  # (hot-reloadable)
  notifications:
    # Discord webhook example:
    # - name: "Alert Channel"
    #   type: "discord"
    #   webhook_url: "https://discord.com/api/webhooks/..."
    #   events:
    #     - geozone_enter
    # - name: "Flight Log"
    #   type: "discord"
    #   enabled: false             # temporarily disabled
    #   webhook_url: "https://discord.com/api/webhooks/..."
    #   events:
    #     - new_session
    #
    # ntfy with Bearer token (ntfy.sh or self-hosted):
    # - name: "Phone Alerts"
    #   type: "ntfy"
    #   webhook_url: "https://ntfy.sh/mytopic"
    #   token: "tk_xxx"
    #   events:
    #     - geozone_enter
    #     - new_session
    #
    # ntfy with Basic auth (self-hosted):
    # - name: "Self-Hosted Alerts"
    #   type: "ntfy"
    #   webhook_url: "https://ntfy.example.com/alerts"
    #   username: "myuser"
    #   password: "mypassword"
    #   events:
    #     - geozone_enter
    #     - new_session
    #
    # Microsoft Teams Incoming Webhook:
    # - name: "Teams Alerts"
    #   type: "teams"
    #   webhook_url: "https://*.webhook.office.com/botid/..."
    #   events:
    #     - geozone_enter
    #     - new_session
    #
    # Teams with Bearer token (tenant-restricted webhooks):
    # - name: "Teams Secure"
    #   type: "teams"
    #   webhook_url: "https://*.logic.azure.com:443/..."
    #   token: "eyJ0eXAiOi..."
    #   events:
    #     - geozone_enter
    #     - new_session
